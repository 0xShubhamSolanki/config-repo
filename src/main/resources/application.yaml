server:
  port: 8888

spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        git:
          uri: https://github.com/0xShubhamSolanki/config-repo.git
          clone-on-start: true
          default-label: main
          search-paths: configs/order-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka