server:
  port: 8082

spring:
  application:
    name: notification-service

  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: false

      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.kodewala.notification_service.dto.OrderEvent
        spring.json.use.type.headers: false

  jackson:
    serialization:
      indent-output: true

# ==============================
# EUREKA CONFIG
# ==============================
eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

# ==============================
# ACTUATOR + ZIPKIN + TRACING
# ==============================
management:
  endpoints:
    web:
      exposure:
        include: "*"

  tracing:
    enabled: true
    sampling:
      probability: 1.0   # dev ke liye 100%

  observation:
    kafka:
      enabled: true      # 🔥 VERY IMPORTANT for Kafka tracing

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

# ==============================
# LOGGING (TraceId visible 🔥)
# ==============================
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

# ==============================
# CUSTOM APP CONFIG
# ==============================
app:
  kafka:
    topic: order-topic
